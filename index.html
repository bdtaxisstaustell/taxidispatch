<!DOCTYPE html>
<html>
<head>
  <title>Taxi Dispatch Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>Dispatch</h2>
  <button onclick="openBooking()">+ New Booking</button>
</div>

<div class="main">

  <div class="topbar">
    <h3>Taxi Dispatch Dashboard</h3>
  </div>

  <div class="panels">
    <div class="panel">
      <h4>Drivers Onboard</h4>
      <div id="drivers"></div>
    </div>

    <div class="panel">
      <h4>Available</h4>
      <div id="availableDrivers"></div>
    </div>

    <div class="panel">
      <h4>On Job</h4>
      <div id="onJobDrivers"></div>
    </div>
  </div>

  <h3>Bookings</h3>

  <input id="searchPhone" placeholder="Search phone">
  <button onclick="searchCustomer()">Search</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Pickup</th>
        <th>Drop</th>
        <th>Fare</th>
        <th>Status</th>
        <th>Driver</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="bookingTable"></tbody>
  </table>

</div>

<!-- Booking Modal -->
<div id="bookingModal" class="modal">
  <div class="modal-content">

    <h2>New Booking</h2>

    <input id="name" placeholder="Customer Name">
    <input id="phone" placeholder="Phone">
    <input id="email" placeholder="Email">

    <input id="pickup" placeholder="Pickup location">
    <input id="dropoff" placeholder="Dropoff location">
    <input id="via" placeholder="Via">

    <button onclick="calculateFare()">Auto Calculate Fare</button>
    <input id="fare" readonly placeholder="Fare">

    <input type="date" id="date">
    <input type="time" id="time">

    <select id="driverSelect"></select>

    <button onclick="addBooking()">Save Booking</button>
    <button onclick="closeBooking()">Close</button>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
