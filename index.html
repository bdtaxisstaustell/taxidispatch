<!DOCTYPE html>
<html>
<head>
  <title>Taxi Dispatch Pro Max</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>🚕 Dispatch</h2>
  <button onclick="openBooking()">+ Booking</button>
  <button onclick="openTariff()">⚙ Tariff</button>
</div>

<div class="main">

  <h2>Dashboard</h2>

  <div class="panels">
    <div class="panel">Drivers: <span id="driversCount"></span></div>
    <div class="panel">Available: <span id="availableCount"></span></div>
    <div class="panel">On Job: <span id="onJobCount"></span></div>
  </div>

  <h3>Jobs</h3>

  <button onclick="filterJobs('all')">All</button>
  <button onclick="filterJobs('today')">Today</button>
  <button onclick="filterJobs('future')">Future</button>
  <button onclick="filterJobs('completed')">Completed</button>

  <br><br>

  <input id="searchPhone" placeholder="Search phone">
  <button onclick="searchCustomer()">Search</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Pickup</th>
        <th>Drop</th>
        <th>Fare</th>
        <th>Status</th>
        <th>Driver</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="bookingTable"></tbody>
  </table>

</div>

<!-- BOOKING MODAL -->
<div id="bookingModal" class="modal">
  <div class="modal-content">
    <h2>New Booking</h2>

    <input id="name" placeholder="Customer Name">
    <input id="phone" placeholder="Phone">

    <input id="pickup" placeholder="Pickup">
    <input id="dropoff" placeholder="Dropoff">

    <button onclick="calculateFare()">Auto Fare</button>
    <input id="fare" readonly placeholder="Fare">

    <input type="date" id="date">

    <select id="driverSelect"></select>

    <button onclick="addBooking()">Save</button>
    <button onclick="closeBooking()">Close</button>
  </div>
</div>

<!-- TARIFF MODAL -->
<div id="tariffModal" class="modal">
  <div class="modal-content">
    <h2>Tariff</h2>

    <label>Base Fare</label>
    <input id="baseFare">

    <label>0-1 Mile</label>
    <input id="rate1">

    <label>1-3 Mile</label>
    <input id="rate2">

    <label>3+ Mile</label>
    <input id="rate3">

    <label>Night Multiplier</label>
    <input id="nightRate">

    <button onclick="saveTariff()">Save</button>
    <button onclick="closeTariff()">Close</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
